<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>UNBANNED WA BY PIK</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:linear-gradient(135deg,#0f2027,#203a43,#2c5364);
height:100vh;
display:flex;
justify-content:center;
align-items:center;
padding:20px;
}

.card{
width:100%;
max-width:380px;
background:white;
padding:30px;
border-radius:25px;
box-shadow:0 10px 30px rgba(0,0,0,0.3);
animation:fade 0.5s ease;
}

@keyframes fade{
from{
opacity:0;
transform:translateY(20px);
}
to{
opacity:1;
transform:translateY(0);
}
}

.logo-img{
text-align:center;
margin-bottom:15px;
}

.logo-img img{
width:90px;
height:90px;
border-radius:50%;
object-fit:cover;
border:4px solid #25D366;
box-shadow:0 0 20px rgba(37,211,102,0.6);
}

.logo{
text-align:center;
font-size:30px;
font-weight:bold;
color:#25D366;
margin-bottom:10px;
}

.desc{
text-align:center;
font-size:14px;
color:gray;
margin-bottom:25px;
line-height:1.5;
}

input,select{
width:100%;
padding:15px;
margin-bottom:15px;
border:none;
background:#f2f2f2;
border-radius:12px;
font-size:16px;
outline:none;
}

button{
width:100%;
padding:15px;
border:none;
border-radius:15px;
background:#25D366;
color:white;
font-size:18px;
font-weight:bold;
cursor:pointer;
transition:0.3s;
}

button:hover{
opacity:0.9;
transform:scale(1.02);
}

.note{
margin-top:15px;
text-align:center;
font-size:12px;
color:gray;
}
</style>
</head>

<body>

<div class="card">

<!-- LOGO -->
<div class="logo-img">
<img src="images/logo.png">
</div>

<div class="logo">
UNBANNED WA BY PIK
</div>

<div class="desc">
Ajukan banding akun WhatsApp yang terkena spam atau banned permanen.
</div>

<input type="text" id="nomor" placeholder="+62XXXXXXXXXXX">

<select id="jenis">
<option value="spam">Banned Spam</option>
<option value="permanen">Banned Permanen</option>
</select>

<button onclick="kirimBanding()">
Lanjut
</button>

<div class="note">
Gunakan WhatsApp resmi agar akun lebih aman.
</div>

</div>

<script>

function kirimBanding(){

const nomor = document.getElementById("nomor").value.trim();
const jenis = document.getElementById("jenis").value;

if(!nomor){
alert("Masukkan nomor WhatsApp terlebih dahulu");
return;
}

let pesan = "";

if(jenis === "spam"){

pesan =
`Akun WhatsApp saya terkena pembatasan karena terdeteksi spam. Saya ingin mengajukan banding karena saya tidak bermaksud melakukan pelanggaran atau mengirim pesan spam yang merugikan pengguna lain.

Nomor WhatsApp saya: ${nomor}

Jika ada aktivitas yang melanggar aturan, saya mohon maaf dan akan lebih berhati-hati dalam menggunakan WhatsApp ke depannya. Saya berharap akun saya dapat ditinjau kembali dan dipulihkan.

Terima kasih atas perhatian dan bantuannya`;

}else{

pesan =
`Saya ingin mengajukan banding untuk akun WhatsApp saya yang terkena banned permanen. Saya menyadari mungkin ada aktivitas yang dianggap melanggar kebijakan WhatsApp, namun saya tidak memiliki niat untuk menyalahgunakan layanan atau melakukan spam.

Nomor WhatsApp saya: ${nomor}

Saya memohon agar akun saya dapat ditinjau kembali. Saya berjanji akan mematuhi seluruh aturan dan menggunakan WhatsApp dengan lebih bijak ke depannya.

Saya sangat berharap akun saya bisa dipulihkan karena nomor tersebut penting untuk komunikasi sehari-hari.

Terima kasih atas waktu dan bantuannya`;

}

const subject = encodeURIComponent("Permintaan Banding Akun WhatsApp");
const body = encodeURIComponent(pesan);

window.location.href =
`mailto:support@support.whatsapp.com?subject=${subject}&body=${body}`;

}

</script>

</body>
</html>
